<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/assignment-4.css">
</head>

<body>
    <section class="container-fluid bg-color ">
        <div class="container primary-text text-center p-1">
            <h1>Dynamic 3D Flip Animation</h1>
            <p class="pt-1">Elevate user interaction with our 3D flip animation for cards, seamlessly blending innovation and engagement into your design.</p>
            <div class="">
                <div class="col-4  margin relative card" >
                    <div class="front absolute card-color border-redius">
                        <div class="row ">
                            <div class="text-left p-1 col-9">
                                <p class="lh-sm blue-color">SHOES</p>
                                <h3 class="black-color">Nike ZOOM Vaporfly  NEXT Premium</h3>
                                <p class="lh-lg blue-color">$ 254.99</p>
                            </div>
                            <button class="btn-flip"><i class="fa-solid fa-up-right-and-down-left-from-center black-color"></i></button>
                        </div>
                        <div class="card-img-1">
                            <img src="images/shoes.png" alt="" class="img-fluid">
                        </div>
                    </div>
                    <div class="back absolute card-color border-redius d-flex flex-column">
                        <div class="row ">
                                <div class="text-left p-1 col-9">
                                    <p class="lh-sm blue-color">SHOES</p>
                                    <h3 class="black-color">Nike ZOOM Vaporfly  NEXT Premium</h3>
                                    <p class="lh-lg blue-color">$ 254.99</p>
                                </div>
                                <button class="btn-flip"><i class="fa-solid fa-down-left-and-up-right-to-center black-color"></i></button>
                            </div>
                            <div class="card-img-2">
                                <img src="images/shoes.png" alt="" class="img-fluid">
                            </div>
                            <div class="p-1">
                                <p>SELECT SIZE</p>
                                <div class="row justify-between ">
                                    <button class="btn-flip"><p class="black-color">5</p></button>
                                    <button class="btn-flip"><p class="black-color">6</p></button>
                                    <button class="btn-flip"><p class="black-color">7</p></button>
                                    <button class="btn-flip"><p class="black-color">8</p></button>
                                    <button class="btn-flip"><p class="black-color">9</p></button>
                                </div>
                                <br>
                                <button class="col-12 btn-cart">add to carrt</button>
                            </div>
                        </div>

                </div>
            </div>
        </div>
    </section>
</body>

</html>
